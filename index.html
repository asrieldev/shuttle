<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CoGo Smart Shuttle</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar" id="topbar">
      <button class="logo" data-route="home" aria-label="CoGo home">
        <span class="logo-icon">↗</span>
        <strong>CoGo</strong>
      </button>
      <nav class="main-nav" aria-label="Main navigation">
        <button data-route="home">Home</button>
        <button data-route="rides">Rides</button>
        <button data-route="about">About</button>
        <button data-route="blog">Blog</button>
        <button data-route="contact">Contact</button>
      </nav>
      <div class="top-actions" id="topActions"></div>
    </header>

    <main id="app" tabindex="-1"></main>
    <div id="toastStack" class="toast-stack" aria-live="polite"></div>

    <script src="app.js"></script>
  </body>
</html>
